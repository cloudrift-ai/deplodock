# Server Benchmark Configuration

# Global benchmark settings
benchmark:
  local_results_dir: "results/intermediate"
  model_dir: "/hf_models"

# GPU Pricing ($ per hour per GPU)
pricing:
  pro6000: 0.93
  h100: 1.91
  h200: 2.06
  b200: 2.68

# Provider-specific configuration
providers:
  gcp:
    create_timeout_spot: 600
    create_timeout_flex_start: 14400
    image_family: "common-cu129-ubuntu-2404-nvidia-580"
    image_project: "deeplearning-platform-release"
    boot_disk_size: "2000GB"
    tags: "ssh"
    # service_account: defaults to $GCP_SERVICE_ACCOUNT env var
  cloudrift:
    # API key: defaults to $CLOUDRIFT_API_KEY env var
    # API URL: defaults to $CLOUDRIFT_API_URL env var, else https://api.cloudrift.ai
    # image_url: override the OS image. By default deplodock auto-picks ROCm for
    # mi* instance types and NVIDIA otherwise (see provisioning/cloudrift.py).
    # billing_exempt: true  # admin-only, skip billing
