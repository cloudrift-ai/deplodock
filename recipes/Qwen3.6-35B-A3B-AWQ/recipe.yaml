# Qwen3.6-35B-A3B-AWQ on 1x V100 SXM3 32GB (sm_70 Volta).
#
# Engine: 1Cat-vLLM fork (https://github.com/1CatAI/1Cat-vLLM), rebuilt as
# cloudriftai/1cat-vllm-sm70 from v1.0.0 wheels with gcc / _DEFAULT_MAX_TOKENS /
# FLASH_ATTN_V100 patches. 1Cat validates this model on 4xV100 TP4 in its README, but
# the A3B sparse compute path runs cleanly on a single V100 too -- see TP choice below.
#
# This is the MoE A3B variant: 35B total params, ~3B active per token (256 experts,
# 8 routed + 1 shared per token, expert intermediate 512). Weights are ~17.5 GB at AWQ
# 4-bit (group_size=128); fits on one 32 GB V100 with ~10 GB headroom for KV + buffers.
#
# TP=1 on a single V100, not TP=4. Measured on the same 4xV100 PCIe-only CloudRift VM
# (no NVLink/NVSwitch exposed in guest):
#   TP=1: 11.6 ms TPOT (peak 87 tok/s decode), single-stream 39 tok/s sustained,
#         median TTFT 8.6 s -- prefill is slow but steady-state decode is fastest.
#   TP=4: 12.2 ms TPOT, single-stream 75 tok/s sustained, median TTFT 0.48 s --
#         all-reduce floor across 4 GPUs costs ~5% per-token decode but speeds prefill 18x.
# TP=1 wins operationally: runs on one GPU, ~4x cheaper to rent. Prefill penalty only
# matters for long-prompt workloads.
#
# CONCURRENCY=4 at context_length=32K: measured 214 tok/s sustained output (5.5x the
# single-stream baseline) on the same hardware. KV pool at gpu_mem_util=0.88 holds
# ~78K tokens -- handles four concurrent 1K-1K-token requests with massive headroom;
# longer real prompts (verified up to 60K input single-stream at gpu_mem_util=0.92)
# also fit but will queue under heavy concurrency. context_length is the advertised
# max -- actual KV usage is per-request.

model:
  # 1Cat's README quotes "tclf90/Qwen3.6-35B-A3B-AWQ" as the validated repo, but that
  # one returns 401 on HF (gated/removed, as of May 2026 -- same fate as their 27B
  # reference). cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit carries the `compressed-tensors` tag,
  # and prior 27B runs showed cyankiwi's compressed-tensors path hits a
  # `Min capability: 75. Current capability: 70` gate inside compressed-tensors --
  # 1Cat's SM70 patches only cover the vanilla AWQ path. QuantTrio's build uses real
  # `quant_method="awq"`, group_size=128, bits=4, gemm version, with shared_expert /
  # mlp.gate / linear_attn / visual in modules_to_not_convert. That AWQ path matches
  # what 1Cat patched for Volta.
  huggingface: "QuantTrio/Qwen3.6-35B-A3B-AWQ"

engine:
  llm:
    tensor_parallel_size: 1
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.88
    context_length: 32768
    max_concurrent_requests: 4
    vllm:
      image: "cloudriftai/1cat-vllm-sm70:1.0.0"
      # max-num-batched-tokens 4096 keeps activation buffers small enough that the KV
      # pool stays ~7.5 GB / ~78K tokens at conc=4. Other flags: auto tool choice +
      # qwen3_coder tool parser + qwen3 reasoning parser. --max-num-seqs comes from
      # max_concurrent_requests above (schema forbids it here). The model config
      # declares quant_method="awq" so no --quantization needed.
      extra_args: "--max-num-batched-tokens 4096 --enable-auto-tool-choice --tool-call-parser qwen3_coder --reasoning-parser qwen3"
      extra_env:
        VLLM_ATTENTION_BACKEND: "FLASH_ATTN_V100"

benchmark:
  # Concurrency-4 workload: 32 prompts x 1000/1000 tokens. Enough for steady-state
  # under 4 concurrent streams (~8 reqs per stream).
  max_concurrency: 4
  num_prompts: 32
  random_input_len: 1000
  random_output_len: 1000

matrices:
  deploy.gpu: "NVIDIA Tesla V100 SXM3 32GB"
  deploy.gpu_count: 1
