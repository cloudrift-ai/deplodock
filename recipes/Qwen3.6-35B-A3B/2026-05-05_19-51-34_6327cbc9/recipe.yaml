model:
  huggingface: "Qwen/Qwen3.6-35B-A3B"

engine:
  llm:
    tensor_parallel_size: 2
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.9
    # Native max is 262144; reduced to 65536 to leave KV cache headroom.
    # ~70 GB BF16 weights split across 2x 96 GB Pro 6000 Max-Q at gpu_memory_utilization=0.9.
    context_length: 65536
    max_concurrent_requests: 16
    vllm:
      image: "vllm/vllm-openai:v0.20.1"
      extra_args: '--enable-auto-tool-choice --tool-call-parser qwen3_coder --reasoning-parser qwen3 --language-model-only --default-chat-template-kwargs ''{"preserve_thinking": true}'''

benchmark:
  max_concurrency: 16
  num_prompts: 64
  random_input_len: 2000
  random_output_len: 2000

matrices:
  deploy.gpu: "NVIDIA RTX PRO 6000 Blackwell Max-Q Workstation Edition"
  deploy.gpu_count: 2
