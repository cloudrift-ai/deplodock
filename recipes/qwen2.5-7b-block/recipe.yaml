command:
  stage:
    - deplodock
    - scripts
    - pyproject.toml
    - requirements.txt
    - Makefile
  run: |
    export PATH=/usr/local/cuda/bin:$$PATH
    export DEPLODOCK_GIT_REV="$git_rev"
    cd $repo_dir
    [ -d venv ] || make setup
    ./venv/bin/pip install -e ".[compile]"
    ./venv/bin/python scripts/bench_block.py \
      --model $hf_model \
      --seq-len $seq_len \
      --batch $batch \
      --iters $iterations \
      --dtype fp16 \
      --backends $backends \
      2>&1 | tee $task_dir/bench_block.log
  result_files:
    - "*.log"
  timeout: 600

matrices:
  cross:
    deploy.gpu_count: 1
    deploy.gpu:
      - "NVIDIA GeForce RTX 5090"
    git_rev: "feature/transformer-compiler@local"
    hf_model: "Qwen/Qwen2.5-7B"
    seq_len: [32, 128, 512]
    batch: 1
    iterations: 20
    backends: "eager,compile,deplodock"
