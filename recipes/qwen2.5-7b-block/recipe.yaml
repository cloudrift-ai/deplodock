# Transformer block benchmark recipe: Qwen2.5-7B
# Compares: eager PyTorch, torch.compile, Deplodock CUDA pipeline, FlashAttention
#
# Usage:
#   python scripts/bench_block.py --model Qwen/Qwen2.5-7B --seq-len 2048
#   python scripts/bench_block.py --model Qwen/Qwen2.5-7B --seq-len 512 --dtype fp32

model: Qwen/Qwen2.5-7B
layer: 0
dtype: fp32

# Sweep sequence lengths to show scaling behavior.
seq_len:
  - 512
  - 1024
  - 2048

# Model dimensions (for reference / verification):
#   hidden_size: 3584
#   num_attention_heads: 28
#   num_key_value_heads: 4
#   head_dim: 128
#   intermediate_size: 18944
#   max_position_embeddings: 131072
