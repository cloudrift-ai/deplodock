command:
  stage:
    - deplodock
    - scripts
    - pyproject.toml
    - requirements.txt
    - Makefile
  run: |
    export PATH=/usr/local/cuda/bin:$$PATH
    export DEPLODOCK_GIT_REV="$git_rev"
    cd $repo_dir
    [ -d venv ] || make setup
    ./venv/bin/python scripts/bench_matmul.py \
      --strategy $strategy \
      --size $size \
      --batch $batch \
      --iterations $iterations \
      --output-dir $task_dir
  result_files:
    - "*.json"
  timeout: 300

aggregate:
  run: |
    ./venv/bin/python scripts/aggregate_sgemm.py $run_dir --output $run_dir/report.md
  timeout: 60

matrices:
  cross:
    deploy.gpu_count: 1
    deploy.driver_version: "595.58.03"
    deploy.cuda_version: "13.2"
    strategy: adaptive
    git_rev: "feature/mini-gpu-compiler@local"
    deploy.gpu:
      - "NVIDIA GeForce RTX 5090"
      - "NVIDIA H200 141GB"
      - "NVIDIA RTX PRO 6000 Blackwell Max-Q Workstation Edition"
    size: [256, 512, 1024, 2048, 4096, 8192, 16384]
    batch: [1, 4, 8, 16]
    iterations: 30
