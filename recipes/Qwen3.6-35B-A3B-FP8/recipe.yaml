model:
  huggingface: "Qwen/Qwen3.6-35B-A3B-FP8"

engine:
  llm:
    tensor_parallel_size: 1
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.9
    # Native max; verified loadable on Pro 6000 Max-Q (96 GB) at gpu_memory_utilization=0.9.
    context_length: 262144
    max_concurrent_requests: 16
    vllm:
      image: "vllm/vllm-openai:v0.20.1"
      extra_args: "--enable-auto-tool-choice --tool-call-parser qwen3_coder --reasoning-parser qwen3 --language-model-only"

benchmark:
  max_concurrency: 16
  num_prompts: 64
  random_input_len: 2000
  random_output_len: 2000

matrices:
  deploy.gpu: "NVIDIA RTX PRO 6000 Blackwell Max-Q Workstation Edition"
  deploy.gpu_count: 1
