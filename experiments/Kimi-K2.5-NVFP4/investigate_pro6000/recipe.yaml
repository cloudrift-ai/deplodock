model:
  huggingface: "nvidia/Kimi-K2.5-NVFP4"

engine:
  llm:
    tensor_parallel_size: 8
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.9
    context_length: 32768
    max_concurrent_requests: 4
    vllm:
      image: "vllm/vllm-openai:latest"
      extra_args: "--tool-call-parser kimi_k2 --reasoning-parser kimi_k2 --kv-cache-dtype bfloat16"

benchmark:
  max_concurrency: 4
  num_prompts: 10
  random_input_len: 1000
  random_output_len: 1000

matrices:
  - deploy.gpu: "NVIDIA RTX PRO 6000 Blackwell Server Edition"
    deploy.gpu_count: 8
