model:
  huggingface: "nvidia/Kimi-K2.5-NVFP4"

engine:
  llm:
    tensor_parallel_size: 4
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.9
    context_length: 262144
    max_concurrent_requests: 32
    vllm:
      image: "vllm/vllm-openai:v0.17.0"
      extra_args: "--tool-call-parser kimi_k2 --reasoning-parser kimi_k2"

benchmark:
  random_input_len: 8000
  random_output_len: 8000

matrices:
  - deploy.gpu: "NVIDIA B200"
    deploy.gpu_count: 4
    engine.llm.max_concurrent_requests: [32, 40, 48, 56, 64, 72, 80]
    benchmark.max_concurrency: [32, 40, 48, 56, 64, 72, 80]
    benchmark.num_prompts: 80
