model:
  huggingface: "Qwen/Qwen3-Coder-Next-FP8"

engine:
  llm:
    tensor_parallel_size: 1
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.9
    context_length: 8192
    max_concurrent_requests: 4

benchmark:
  max_concurrency: 4
  num_prompts: 8
  random_input_len: 4000
  random_output_len: 4000

matrices:
  - deploy.gpu: "RTX PRO 6000 Blackwell Max-Q Workstation Edition"
    deploy.gpu_count: 1
    engine.llm.vllm.image: "vllm/vllm-openai:latest"
  - deploy.gpu: "RTX PRO 6000 Blackwell Max-Q Workstation Edition"
    deploy.gpu_count: 1
    engine.llm.sglang.image: "lmsysorg/sglang:latest"
    engine.llm.sglang.extra_args: "--attention-backend triton"
  - deploy.gpu: "RTX PRO 6000 Blackwell Max-Q Workstation Edition"
    deploy.gpu_count: 1
    engine.llm.sglang.image: "lmsysorg/sglang:latest"
    engine.llm.sglang.extra_args: "--attention-backend trtllm_mha"
