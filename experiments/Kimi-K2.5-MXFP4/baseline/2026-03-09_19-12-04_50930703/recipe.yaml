model:
  huggingface: "amd/Kimi-K2.5-MXFP4"

engine:
  llm:
    tensor_parallel_size: 4
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.9
    context_length: 262144
    max_concurrent_requests: 8
    vllm:
      image: "vllm/vllm-openai-rocm:v0.17.0"
      extra_args: "--enforce-eager --mm-encoder-tp-mode data --tool-call-parser kimi_k2 --reasoning-parser kimi_k2"

benchmark:
  max_concurrency: 8
  num_prompts: 16
  random_input_len: 8000
  random_output_len: 8000

matrices:
  - deploy.gpu: "AMD Instinct MI350X"
    deploy.gpu_count: 4
    engine.llm.vllm.extra_env:
      VLLM_ROCM_USE_AITER: 1
