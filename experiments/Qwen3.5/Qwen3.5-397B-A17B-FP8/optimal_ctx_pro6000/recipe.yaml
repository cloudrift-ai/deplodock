model:
  huggingface: "Qwen/Qwen3.5-397B-A17B-FP8"

engine:
  llm:
    tensor_parallel_size: 8
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.8
    max_concurrent_requests: 4
    mem_fraction_static: 0.8
    sglang:
      image: "lmsysorg/sglang:dev-cu13"
      extra_args: "--reasoning-parser qwen3 --tool-call-parser qwen3_coder"
      extra_env:
        SGLANG_ENABLE_JIT_DEEPGEMM: 0

benchmark:
  max_concurrency: 4
  num_prompts: 8
  random_input_len: 4000
  random_output_len: 4000

matrices:
  - deploy.gpu: "NVIDIA RTX PRO 6000 Blackwell Max-Q Workstation Edition"
    deploy.gpu_count: 8
    engine.llm.context_length: [8192, 16384, 32768, 65536, 131072, 262144]
