model:
  huggingface: "Qwen/Qwen3.5-122B-A10B-FP8"

engine:
  llm:
    tensor_parallel_size: 8
    pipeline_parallel_size: 1
    gpu_memory_utilization: 0.8
    max_concurrent_requests: 4
    mem_fraction_static: 0.8
    docker_options:
      ulimits:
        memlock:
          soft: -1
          hard: -1
    sglang:
      image: "lmsysorg/sglang:dev-cu13"
      extra_args: "--kv-cache-dtype bf16 --reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder"
      extra_env:
        SGLANG_ENABLE_JIT_DEEPGEMM: 0
        SGLANG_DISABLE_DEEP_GEMM: 1
        SGLANG_SET_CPU_AFFINITY: 1
        NCCL_P2P_LEVEL: SYS
        NCCL_IB_DISABLE: 1
        NCCL_MIN_NCHANNELS: 8

benchmark:
  max_concurrency: 4
  num_prompts: 8
  random_input_len: 4000
  random_output_len: 4000

matrices:
  - deploy.gpu: "NVIDIA RTX PRO 6000 Blackwell Max-Q Workstation Edition"
    deploy.gpu_count: 8
    engine.llm.context_length: 262144
