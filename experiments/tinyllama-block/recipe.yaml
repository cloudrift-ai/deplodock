command:
  stage:
    - emmy
    - scripts
    - pyproject.toml
    - requirements.txt
    - Makefile
  run: |
    export PATH=/usr/local/cuda/bin:$$PATH
    export EMMY_GIT_REV="$git_rev"
    cd $repo_dir
    [ -d venv ] || make setup
    ./venv/bin/python -c "import torch, cupy" 2>/dev/null || ./venv/bin/pip install -e ".[compile]"
    ./venv/bin/python scripts/bench_block.py \
      --model $hf_model \
      --seq-len $seq_len \
      --batch $batch \
      --iters $iterations \
      --dtype $dtype \
      --backends $backends \
      2>&1 | tee $task_dir/bench_block.log
  result_files:
    - "*.log"
  timeout: 600

matrices:
  cross:
    deploy.gpu_count: 1
    deploy.gpu:
      - "NVIDIA GeForce RTX 5090"
    git_rev: "feature/transformer-compiler@local"
    hf_model: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    dtype:
      - fp32        # Emmy currently generates FP32 only
      - fp16        # Real-world comparison (eager/compile use half + tensor cores)
    seq_len: [32, 128, 512]
    batch: 1
    iterations: 10
    backends: "eager,compile,emmy"
